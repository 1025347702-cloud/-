<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手写数字识别演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .demo-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }
        
        .canvas-container {
            text-align: center;
        }
        
        #drawingCanvas {
            border: 3px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        #clearBtn {
            background: #ff6b6b;
            color: white;
        }
        
        #clearBtn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        #predictBtn {
            background: #4ecdc4;
            color: white;
        }
        
        #predictBtn:hover {
            background: #26a69a;
            transform: translateY(-2px);
        }
        
        .results {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            min-height: 300px;
        }
        
        .prediction {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .predicted-number {
            font-size: 6em;
            font-weight: bold;
            color: #4ecdc4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        
        .confidence {
            font-size: 1.2em;
            color: #666;
        }
        
        .probabilities {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .prob-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .prob-number {
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .prob-value {
            color: #666;
            font-size: 0.9em;
        }
        
        .instructions {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        
        .instructions h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .demo-area {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
            
            #drawingCanvas {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✍️ 手写数字识别演示</h1>
            <p>使用鼠标或触摸屏手写数字，AI模型将实时识别</p>
        </div>
        
        <div class="demo-area">
            <div class="canvas-container">
                <canvas id="drawingCanvas" width="280" height="280"></canvas>
                <div class="controls">
                    <button id="clearBtn">🗑️ 清除画板</button>
                    <button id="predictBtn">🔍 识别数字</button>
                </div>
            </div>
            
            <div class="results">
                <div class="prediction">
                    <h3>识别结果</h3>
                    <div class="predicted-number" id="predictedNumber">?</div>
                    <div class="confidence" id="confidence">请先手写一个数字</div>
                </div>
                
                <div class="probabilities" id="probabilities">
                    <!-- 概率分布将在这里动态生成 -->
                </div>
                
                <div class="instructions">
                    <h3>使用说明</h3>
                    <ol>
                        <li>在左侧画板上用鼠标手写一个数字（0-9）</li>
                        <li>尽量写得大一些，占满整个画板</li>
                        <li>点击"识别数字"按钮查看AI识别结果</li>
                        <li>可以多次尝试不同数字</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化画板
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const predictBtn = document.getElementById('predictBtn');
        const predictedNumber = document.getElementById('predictedNumber');
        const confidence = document.getElementById('confidence');
        const probabilities = document.getElementById('probabilities');
        
        // 画板状态
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // 初始化画板
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'black';
        }
        
        // 开始绘画
        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = getCoordinates(e);
        }
        
        // 绘画中
        function draw(e) {
            if (!isDrawing) return;
            
            const [x, y] = getCoordinates(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            [lastX, lastY] = [x, y];
        }
        
        // 结束绘画
        function stopDrawing() {
            isDrawing = false;
        }
        
        // 获取坐标（支持触摸屏）
        function getCoordinates(e) {
            let x, y;
            if (e.type.includes('touch')) {
                const rect = canvas.getBoundingClientRect();
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.offsetX;
                y = e.offsetY;
            }
            return [x, y];
        }
        
        // 清除画板
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            predictedNumber.textContent = '?';
            confidence.textContent = '请先手写一个数字';
            probabilities.innerHTML = '';
        }
        
        // 模拟AI识别（实际项目中这里会调用Python后端）
        function predictDigit() {
            // 这里应该是调用Python后端的API
            // 由于是演示，我们使用模拟数据
            
            // 获取画布数据
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 简单的模拟识别逻辑（实际应该发送到后端处理）
            const simulatedPrediction = simulatePrediction();
            
            // 显示结果
            predictedNumber.textContent = simulatedPrediction.digit;
            confidence.textContent = `置信度: ${(simulatedPrediction.confidence * 100).toFixed(1)}%`;
            
            // 显示概率分布
            displayProbabilities(simulatedPrediction.probabilities);
            
            // 实际项目中这里应该是：
            // fetch('/api/predict', {
            //     method: 'POST',
            //     body: JSON.stringify({image: base64Image})
            // })
            // .then(response => response.json())
            // .then(data => {
            //     // 处理返回的预测结果
            // });
        }
        
        // 模拟预测结果
        function simulatePrediction() {
            // 生成随机但合理的预测结果
            const digit = Math.floor(Math.random() * 10);
            const confidence = 0.7 + Math.random() * 0.25; // 70-95%置信度
            
            // 生成概率分布
            const probabilities = Array(10).fill(0);
            probabilities[digit] = confidence;
            
            // 其他数字分配剩余概率
            const remaining = 1 - confidence;
            for (let i = 0; i < 9; i++) {
                probabilities[(digit + i + 1) % 10] = remaining / 9 * (0.5 + Math.random() * 0.5);
            }
            
            // 归一化
            const sum = probabilities.reduce((a, b) => a + b, 0);
            probabilities.forEach((p, i) => probabilities[i] = p / sum);
            
            return {
                digit: digit,
                confidence: confidence,
                probabilities: probabilities
            };
        }
        
        // 显示概率分布
        function displayProbabilities(probs) {
            probabilities.innerHTML = '';
            
            probs.forEach((prob, digit) => {
                const probItem = document.createElement('div');
                probItem.className = 'prob-item';
                
                const probNumber = document.createElement('div');
                probNumber.className = 'prob-number';
                probNumber.textContent = digit;
                
                const probValue = document.createElement('div');
                probValue.className = 'prob-value';
                probValue.textContent = `${(prob * 100).toFixed(1)}%`;
                
                probItem.appendChild(probNumber);
                probItem.appendChild(probValue);
                probabilities.appendChild(probItem);
            });
        }
        
        // 事件监听
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        // 触摸屏支持
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        clearBtn.addEventListener('click', clearCanvas);
        predictBtn.addEventListener('click', predictDigit);
        
        // 初始化
        initCanvas();
        
        // 提示用户
        console.log('手写数字识别演示已加载');
        console.log('提示：在实际项目中，预测功能需要连接到Python后端API');
    </script>
</body>
</html>
